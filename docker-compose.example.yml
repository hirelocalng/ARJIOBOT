services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./storage:/app/storage
    command: python -m arjiobot.api.dev_server

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env.example
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
